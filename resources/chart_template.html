<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e222d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #chart-container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js">
    </script>
    <script>
        // Создаем график
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            width: document.getElementById('chart-container').clientWidth,
            height: document.getElementById('chart-container').clientHeight,
            layout: {
                background: { color: '#1e222d' },
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#2a2e39' },
                horzLines: { color: '#2a2e39' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: '#2a2e39',
            },
            timeScale: {
                borderColor: '#2a2e39',
                timeVisible: true,
                secondsVisible: false,
            },
        });

        // Создаем серию для свечей
        const series = chart.addCandlestickSeries({
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderDownColor: '#ef5350',
            borderUpColor: '#26a69a',
            wickDownColor: '#ef5350',
            wickUpColor: '#26a69a',
        });

        // Функция для обновления графика
        function updateChart(data) {
            // Проверяем, что данные получены
            if (!data || data.length === 0) {
                console.log('Нет данных для отображения');
                return;
            }

            console.log('Получено свечей:', data.length);
            console.log('Первая свеча:', data[0]);
            console.log('Последняя свеча:', data[data.length - 1]);

            // Lightweight Charts ожидает данные в формате:
            // { time: timestamp, open: price, high: price, low: price, close: price }
            // time должен быть в секундах (Unix timestamp) или в формате 'YYYY-MM-DD'
            const chartData = data.map(item => ({
                time: Math.floor(item.time / 1000), // конвертируем миллисекунды в секунды
                open: item.open,
                high: item.high,
                low: item.low,
                close: item.close,
            }));

            series.setData(chartData);
            chart.timeScale().fitContent();

            console.log('График обновлен, свечей:', chartData.length);
        }

        // Функция для установки текущего времени
        function setCurrentTime(timestamp) {
            // timestamp в миллисекундах, конвертируем в секунды
            const timeInSeconds = Math.floor(timestamp / 1000);
            chart.timeScale().setVisibleLogicalRange({
                from: timeInSeconds - 86400 * 30, // 30 дней назад
                to: timeInSeconds + 86400, // 1 день вперед
            });
        }

        // Функция для установки таймфрейма
        function setTimeframe(tf) {
            // Можно добавить логику для изменения отображения
            console.log('Таймфрейм:', tf);
        }

        // Обработка изменения размера окна
        window.addEventListener('resize', function() {
            chart.resize(
                document.getElementById('chart-container').clientWidth,
                document.getElementById('chart-container').clientHeight
            );
        });

        // Экспортируем функции для вызова из Python
        window.updateChart = updateChart;
        window.setCurrentTime = setCurrentTime;
        window.setTimeframe = setTimeframe;
        window.chart = chart;
        window.series = series;

        console.log('Chart initialized');
    </script>
</body>
</html>
