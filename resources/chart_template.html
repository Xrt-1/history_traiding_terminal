<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1e222d;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #chart-container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <script src="https://unpkg.com/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js">
    </script>
    <script>
        // Создаем график
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            width: document.getElementById('chart-container').clientWidth,
            height: document.getElementById('chart-container').clientHeight,
            layout: {
                background: { color: '#1e222d' },
                textColor: '#d1d4dc',
            },
            grid: {
                vertLines: { color: '#2a2e39' },
                horzLines: { color: '#2a2e39' },
            },
            crosshair: {
                mode: LightweightCharts.CrosshairMode.Normal,
            },
            rightPriceScale: {
                borderColor: '#2a2e39',
            },
            timeScale: {
                borderColor: '#2a2e39',
                timeVisible: true,
                secondsVisible: false,
            },
        });

        // Создаем серию для свечей
        const series = chart.addCandlestickSeries({
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderDownColor: '#ef5350',
            borderUpColor: '#26a69a',
            wickDownColor: '#ef5350',
            wickUpColor: '#26a69a',
        });

        // Храним все данные
        let fullData = [];
        let isDataLoaded = false;
        const DEFAULT_BARS_TO_SHOW = 500;

        // Функция для обновления графика
        function updateChart(data) {
            if (!data || data.length === 0) {
                console.log('Нет данных для отображения');
                return;
            }

            console.log('Получено свечей:', data.length);

            // Сохраняем все данные
            fullData = data.map(item => ({
                time: Math.floor(item.time / 1000),
                open: item.open,
                high: item.high,
                low: item.low,
                close: item.close,
            }));

            // Показываем последние N свечей
            showLastBars(DEFAULT_BARS_TO_SHOW);
            isDataLoaded = true;
        }

        // Функция для показа последних N свечей
        function showLastBars(count) {
            if (!fullData || fullData.length === 0) return;

            const total = fullData.length;
            const barsToShow = Math.min(count, total);
            const startIndex = Math.max(0, total - barsToShow);
            
            // Берем только последние N свечей
            const visibleData = fullData.slice(startIndex);
            series.setData(visibleData);
            
            // Подгоняем масштаб под видимые данные
            chart.timeScale().fitContent();
            
            console.log(`Показано ${visibleData.length} свечей (из ${total})`);
        }

        // Функция для установки текущего времени
        function setCurrentTime(timestamp) {
            if (!fullData || fullData.length === 0) return;

            const timeInSeconds = Math.floor(timestamp / 1000);
            
            // Находим индекс ближайшей свечи
            let index = 0;
            for (let i = 0; i < fullData.length; i++) {
                if (fullData[i].time >= timeInSeconds) {
                    index = i;
                    break;
                }
            }
            
            // Показываем окно вокруг выбранной свечи
            const halfWindow = Math.floor(DEFAULT_BARS_TO_SHOW / 2);
            const from = Math.max(0, index - halfWindow);
            const to = Math.min(fullData.length, index + halfWindow);
            
            const visibleData = fullData.slice(from, to);
            series.setData(visibleData);
            chart.timeScale().fitContent();
        }

        // Функция для установки таймфрейма
        function setTimeframe(tf) {
            console.log('Таймфрейм:', tf);
            // После смены ТФ показываем последние свечи
            if (isDataLoaded) {
                setTimeout(function() {
                    showLastBars(DEFAULT_BARS_TO_SHOW);
                }, 50);
            }
        }

        // Функция для подгонки содержимого
        function fitContent() {
            if (!fullData || fullData.length === 0) return;
            chart.timeScale().fitContent();
        }

        // Обработка изменения размера окна
        window.addEventListener('resize', function() {
            chart.resize(
                document.getElementById('chart-container').clientWidth,
                document.getElementById('chart-container').clientHeight
            );
        });

        // Экспортируем функции для вызова из Python
        window.updateChart = updateChart;
        window.setCurrentTime = setCurrentTime;
        window.setTimeframe = setTimeframe;
        window.fitContent = fitContent;
        window.showLastBars = showLastBars;
        window.chart = chart;
        window.series = series;

        console.log('Chart initialized');
    </script>
</body>
</html>
