<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chart</title>
    <style>
        body { margin: 0; padding: 0; background: #1e222d; overflow: hidden; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>
    
    <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
    <script>
        let chart = null;
        let series = null;
        let currentData = [];
        
        function initChart() {
            try {
                // Проверяем, что библиотека загружена
                if (typeof LightweightCharts === 'undefined') {
                    console.error('LightweightCharts не загружен!');
                    return;
                }
                
                chart = LightweightCharts.createChart(document.getElementById('chart'), {
                    width: document.getElementById('chart').clientWidth,
                    height: document.getElementById('chart').clientHeight,
                    layout: {
                        background: { color: '#1e222d' },
                        textColor: '#d1d4dc',
                    },
                    grid: {
                        vertLines: { color: '#2a2e39' },
                        horzLines: { color: '#2a2e39' },
                    },
                    timeScale: {
                        timeVisible: true,
                        secondsVisible: false,
                        borderColor: '#2a2e39',
                    },
                    rightPriceScale: {
                        borderColor: '#2a2e39',
                    },
                });
                
                series = chart.addCandlestickSeries({
                    upColor: '#26a69a',
                    downColor: '#ef5350',
                    borderVisible: false,
                    wickUpColor: '#26a69a',
                    wickDownColor: '#ef5350',
                });
                
                console.log('Chart initialized successfully');
                
            } catch (error) {
                console.error('Error initializing chart:', error);
            }
        }
        
        function updateChart(data) {
            if (!series) {
                console.warn('Series not initialized, trying to init...');
                initChart();
                if (!series) return;
            }
            
            try {
                currentData = data;
                series.setData(data);
                chart.timeScale().fitContent();
                console.log('Data updated:', data.length, 'candles');
            } catch (error) {
                console.error('Error updating chart:', error);
            }
        }
        
        function setTimeframe(tf) {
            if (chart) {
                chart.timeScale().fitContent();
            }
        }
        
        function setCurrentTime(timestamp) {
            if (!chart || !currentData.length) return;
            
            try {
                let found = false;
                for (let i = 0; i < currentData.length; i++) {
                    if (currentData[i].time >= timestamp) {
                        const from = Math.max(0, i - 50);
                        const to = Math.min(currentData.length - 1, i + 50);
                        chart.timeScale().setVisibleLogicalRange({
                            from: from,
                            to: to,
                        });
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    chart.timeScale().setVisibleLogicalRange({
                        from: Math.max(0, currentData.length - 100),
                        to: currentData.length - 1,
                    });
                }
            } catch (error) {
                console.error('Error setting time:', error);
            }
        }
        
        function getCurrentTime() {
            if (!chart) return null;
            try {
                const range = chart.timeScale().getVisibleLogicalRange();
                if (range && currentData.length > 0) {
                    const midIdx = Math.floor((range.from + range.to) / 2);
                    if (midIdx >= 0 && midIdx < currentData.length) {
                        return currentData[midIdx].time;
                    }
                }
            } catch (error) {
                console.error('Error getting time:', error);
            }
            return null;
        }
        
        // Инициализация после полной загрузки страницы
        if (document.readyState === 'complete') {
            initChart();
        } else {
            window.addEventListener('load', function() {
                setTimeout(initChart, 100); // Небольшая задержка для гарантии
            });
        }
        
        // Обработка изменения размера окна
        window.addEventListener('resize', function() {
            if (chart) {
                chart.resize(
                    document.getElementById('chart').clientWidth,
                    document.getElementById('chart').clientHeight
                );
            }
        });
        
        console.log('Chart template loaded');
    </script>
</body>
</html>
